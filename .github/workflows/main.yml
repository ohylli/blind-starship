name: GenerateBuilds

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-port-o2r:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Install dependencies
      run: sudo apt-get install gcc g++ git cmake ninja-build lsb-release
    - name: ccache
      uses: hendrikmuhs/ccache-action@v1.2.13
      with:
        key: ${{ runner.os }}-o2r-ccache-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-o2r-ccache-${{ github.ref }}
          ${{ runner.os }}-o2r-ccache-
    - name: Cache build folders
      uses: actions/cache@v4
      with:
        key: ${{ runner.os }}-o2r-build-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-o2r-build-${{ github.ref }}
          ${{ runner.os }}-o2r-build-
        path: |
          tools/Torch/cmake-build-release
    - name: Generate starship.o2r
      run: |
        export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
        make -C tools/Torch type=release -j3
        tools/Torch/cmake-build-release/torch pack port starship.o2r o2r
    - uses: actions/upload-artifact@v4
      with:
        name: starship.o2r
        path: starship.o2r
        retention-days: 1

  build-windows:
    needs: generate-port-o2r
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -S . -B "build/x64" -G "Visual Studio 17 2022" -T v143 -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build ./build/x64 --config Release --parallel 10
      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: ./build/x64/Release
      - name: Create Package
        run: |
          mkdir starship-release
          mv build/x64/Release/Starship.exe starship-release/
          mv build/x64/Release/starship.o2r starship-release/
          mv build/x64/Release/prism.dll starship-release/
          mv config.yml starship-release/
          mv assets starship-release/
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt" -OutFile "starship-release/gamecontrollerdb.txt"
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: starship-windows
          path: starship-release

  release-alpha-windows:
    needs: build-windows
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT lets us push the alpha-prev tag. GITHUB_TOKEN cannot, because
          # the previous-alpha commit modifies .github/workflows/*, and only
          # the release API (used by gh release create) has the workflow-
          # permission exception. PAT scopes required: Contents write,
          # Workflows write.
          token: ${{ secrets.ALPHA_RELEASE_PAT }}
      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: starship-windows
          path: starship-release
      - name: Zip package
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"
          ZIP_NAME="Starship-windows-alpha-${SHORT_SHA}.zip"
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
          (cd starship-release && zip -r "../$ZIP_NAME" .)
      - name: Replace alpha release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Move the alpha-prev tag to the previous alpha's commit so
          # --generate-notes has a stable left-hand side for the compare.
          PREV_SHA=$(gh release view alpha --repo "$GITHUB_REPOSITORY" --json targetCommitish -q .targetCommitish 2>/dev/null || true)
          if [ -n "$PREV_SHA" ]; then
            git tag -f alpha-prev "$PREV_SHA"
            git push origin -f "refs/tags/alpha-prev"
          fi

          gh release delete alpha --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true

          NOTES_ARGS=(--generate-notes)
          if [ -n "$PREV_SHA" ]; then
            NOTES_ARGS+=(--notes-start-tag alpha-prev)
          fi
          if [ -f .github/alpha-release-notes.md ]; then
            NOTES_ARGS+=(--notes-file .github/alpha-release-notes.md)
          fi

          gh release create alpha \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --target "${{ github.sha }}" \
            --title "Alpha (rolling) — ${SHORT_SHA}" \
            "${NOTES_ARGS[@]}" \
            "${ZIP_NAME}"

  build-macos:
    if: false  # disabled: upstream macOS build is broken; re-enable when fixed
    needs: generate-port-o2r
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: melusina-org/setup-macports@v1
        with:
          parameters: '.github/macports.yml'
      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: macos # ccache-macos
      - name: Build
        run: |
          cmake -H. -Bbuild-cmake -GNinja -DCMAKE_BUILD_TYPE=Release -D CMAKE_C_COMPILER_LAUNCHER=ccache -D CMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build build-cmake -j
      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: ./build-cmake
      - name: Create Package
        run: |
          (cd build-cmake && cpack)
          mv _packages/*.dmg Starship.dmg
          mv README.md readme.txt
      - name: Publish packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Starship-mac
          path: |
            Starship.dmg
            readme.txt

  build-linux:
    needs: generate-port-o2r
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Update machine
        run: sudo apt update
      - name: Install dependencies
        run: sudo apt-get install gcc g++ git cmake ninja-build lsb-release libsdl2-dev libpng-dev libsdl2-net-dev libzip-dev zipcmp zipmerge ziptool nlohmann-json3-dev libtinyxml2-dev libspdlog-dev libboost-dev libopengl-dev libogg-dev libvorbis-dev
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: linux-ccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            linux-ccache-${{ github.ref }}
            linux-ccache-
      - name: Cache build folders
        uses: actions/cache@v4
        with:
          key: linux-build-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            linux-build-${{ github.ref }}
            linux-build-
          path: |
            SDL2-2.30.3
            tinyxml2-10.0.0
            libzip-1.10.1
      - name: Install latest SDL
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          if [ ! -d "SDL2-2.30.3" ]; then
            wget https://www.libsdl.org/release/SDL2-2.30.3.tar.gz
            tar -xzf SDL2-2.30.3.tar.gz
          fi
          cd SDL2-2.30.3
          ./configure --enable-hidapi-libusb
          make -j 10
          sudo make install
          sudo cp -av /usr/local/lib/libSDL* /lib/x86_64-linux-gnu/
      - name: Install latest tinyxml2
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          wget https://github.com/leethomason/tinyxml2/archive/refs/tags/10.0.0.tar.gz
          tar -xzf 10.0.0.tar.gz
          cd tinyxml2-10.0.0
          mkdir -p build
          cd build
          cmake ..
          make
          sudo make install
      - name: Install libzip without crypto
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          if [ ! -d "libzip-1.10.1" ]; then
            wget https://github.com/nih-at/libzip/releases/download/v1.10.1/libzip-1.10.1.tar.gz
            tar -xzf libzip-1.10.1.tar.gz
          fi
          cd libzip-1.10.1
          mkdir -p build
          cd build
          cmake .. -DENABLE_COMMONCRYPTO=OFF -DENABLE_GNUTLS=OFF -DENABLE_MBEDTLS=OFF -DENABLE_OPENSSL=OFF
          make
          sudo make install
          sudo cp -av /usr/local/lib/libzip* /lib/x86_64-linux-gnu/
      - name: Download starship.o2r
        uses: actions/download-artifact@v4
        with:
          name: starship.o2r
          path: ./build-cmake
      - name: Build
        run: |
          cmake -H. -Bbuild-cmake -GNinja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-cmake --config Release -j3
          (cd build-cmake && cpack -G External)
          wget -O gamecontrollerdb.txt https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt
          mv README.md readme.txt
          mv build-cmake/*.appimage starship.appimage
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Starship-linux
          path: |
            starship.appimage
            config.yml
            assets
            gamecontrollerdb.txt

  build-switch:
    if: false  # disabled: upstream Switch build is broken; re-enable when fixed
    needs: generate-port-o2r
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:20241023
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          sudo apt-get remove -y cmake
          git -C libultraship remote add nx https://github.com/Net64DD/libultraship.git
          git -C libultraship fetch nx
          git -C libultraship checkout nx/main-nx
          wget https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-x86_64.sh -O /tmp/cmake.sh
          sudo sh /tmp/cmake.sh --prefix=/usr/local/ --exclude-subdir
          cmake -H. -Bbuild-switch -GNinja -DCMAKE_TOOLCHAIN_FILE=/opt/devkitpro/cmake/Switch.cmake
          cmake --build build-switch --config Release -j3
          wget -O gamecontrollerdb.txt https://raw.githubusercontent.com/mdqinc/SDL_GameControllerDB/master/gamecontrollerdb.txt
          mv README.md readme.txt
          mv build-switch/*.nro Starship.nro
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: Starship-switch
          path: |
            Starship.nro
            config.yml
            assets
            gamecontrollerdb.txt
